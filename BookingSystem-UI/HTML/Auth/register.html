<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | BookSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #3b82f6;
            --accent-color: #6366f1;
            --bg-dark: #0f172a;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* نفس الخلفية المتحركة لصفحة الدخول */
            background: linear-gradient(-45deg, #0f172a, #1e293b, #1e1b4b, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* تأثير Glassmorphism للكارت */
        .reg-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .reg-card h3 {
            color: #fff;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .reg-card p.subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .form-label {
            color: #cbd5e1;
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
        }

        .input-group-text {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            border-radius: 12px !important;
            margin-left: 10px;
        }

        .form-control {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff !important;
            border-radius: 12px !important;
            padding: 11px;
            transition: 0.3s;
        }

        .form-control:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
            outline: none;
        }

        /* الزر بنفس لون صفحة الدخول لتوحيد الهوية */
        .btn-register {
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            color: white;
            margin-top: 15px;
            transition: 0.3s;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.5);
            filter: brightness(1.1);
        }

        .login-link {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .glow-circle {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent-color);
            filter: blur(160px);
            opacity: 0.15;
            z-index: -1;
            top: 10%;
            left: 10%;
        }
        .form-control::placeholder {
            color: rgba(151, 150, 150, 0.7) !important;
        }
    </style>
</head>
<body>

    <div class="glow-circle"></div>

    <div class="reg-card shadow-2xl text-center">
        <div class="mb-3">
            <i class="fas fa-user-plus fa-3x text-primary"></i>
        </div>
        <h3>إنشاء حساب جديد</h3>
        <p class="subtitle">انضم إلينا وابدأ إدارة أعمالك بذكاء</p>

        <form id="registerForm" class="text-start">
            <div class="mb-3">
                <label class="form-label">الاسم بالكامل</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" id="regName" class="form-control" required placeholder="محمد أحمد...">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">البريد الإلكتروني</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="regEmail" class="form-control" required placeholder="name@gmail.com">
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label">كلمة المرور</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="regPassword" class="form-control" required placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="btn btn-register w-100">
                <i class="fas fa-user-check me-2"></i> تأكيد وإنشاء الحساب
            </button>
            
            <p class="login-link text-center">
                لديك حساب بالفعل؟ <a href="Login.html">سجل دخول الآن</a>
            </p>
        </form>
    </div>

    <script src="../JS/auth.js"></script>
</body>
</html>
