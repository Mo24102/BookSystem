<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب | BookSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .reg-card { width: 100%; max-width: 450px; padding: 20px; border-radius: 15px; border: none; }
    </style>
</head>
<body>

<div class="card reg-card shadow-lg">
    <h3 class="text-center mb-4">حساب جديد</h3>
    <form id="registerForm">
        <div class="mb-3">
            <label>الاسم بالكامل</label>
            <input type="text" id="regName" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>البريد الإلكتروني</label>
            <input type="email" id="regEmail" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>كلمة المرور</label>
            <input type="password" id="regPassword" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success w-100 mb-3">إنشاء حساب</button>
        <p class="text-center">لديك حساب بالفعل؟ <a href="Login.html">دخول</a></p>
    </form>
</div>

<script src="../JS/auth.js"></script>
</body>
</html>
