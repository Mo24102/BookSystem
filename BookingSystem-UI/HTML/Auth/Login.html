<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول | BookSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; border: none; }
    </style>
</head>
<body>

<div class="card login-card shadow-lg">
    <h3 class="text-center mb-4">تسجيل الدخول</h3>
    <form id="loginForm">
        <div class="mb-3">
            <label>البريد الإلكتروني</label>
            <input type="email" id="loginEmail" class="form-control" required placeholder="Mohamed@gmail.com">
        </div>
        <div class="mb-3">
            <label>كلمة المرور</label>
            <input type="password" id="loginPassword" class="form-control" required placeholder="********">
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">دخول</button>
        <p class="text-center">ليس لديك حساب؟ <a href="register.html">سجل الآن</a></p>
    </form>
</div>

<script src="../../JS/auth.js"></script>
</body>
</html>
