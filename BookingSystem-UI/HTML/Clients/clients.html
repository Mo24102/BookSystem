<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحجز | إدارة العملاء والمالية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --dark-bg: #0f172a; 
            --card-bg: #1e293b;
            --accent-blue: #3b82f6; 
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --success-green: #22c55e;
        }

        body { 
            background: var(--dark-bg); 
            padding: 20px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: var(--text-main);
        }

        /* تنسيق كارت الجدول */
        .card-table { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 25px; 
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        /* إعدادات السكرول (التمرير) */
        .table-container {
            max-height: 600px; 
            overflow-y: auto; 
            overflow-x: auto; 
            border: 1px solid var(--border-color);
            border-radius: 12px;
            position: relative;
        }

        /* تثبيت ورسم رأس الجدول */
        .table { color: var(--text-main); margin-bottom: 0; }
        .table thead th {
            position: sticky !important;
            top: 0;
            background-color: #2d3748 !important; /* لون أفتح قليلاً للرأس */
            color: var(--accent-blue);
            z-index: 100;
            white-space: nowrap;
            
            border-bottom: 2px solid var(--accent-blue);
            padding: 15px;
        }

        .table td { 
            white-space: nowrap; 
            vertical-align: middle; 
            border-bottom: 1px solid var(--border-color);
            border-left: 1px solid #334155; /* لون الخط الفاصل بين الأعمدة */
            padding: 12px 15px;
            background: transparent;
            color: var(--text-main);
        }

        .table-hover tbody tr:hover {
            background-color: rgba(59, 130, 246, 0.05) !important;
        }

        /* تجميل شكل السكرول بار ليناسب الداشبورد */
        .table-container::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-container::-webkit-scrollbar-track { background: var(--dark-bg); }
        .table-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }

        /* البحث */
        .search-box { 
            max-width: 400px; 
            background: var(--dark-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }
        .search-box input {
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
        }
        .search-box input:focus {
            box-shadow: none;
            background: transparent;
            color: white;
        }
        .search-box .input-group-text {
            background: transparent;
            border: none;
            color: var(--text-muted);
        }

        /* المودال الداكن */
        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 20px;
        }
        .modal-header { border-bottom: 1px solid var(--border-color); }
        .modal-footer { border-top: 1px solid var(--border-color); background: rgba(0,0,0,0.1); }
        
        .form-control, .form-select {
            background-color: var(--dark-bg);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 8px;
        }
        .form-control:focus, .form-select:focus {
            background-color: var(--dark-bg);
            color: white;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
        }
        .form-control::placeholder {
            color: rgba(151, 150, 150, 0.7) !important;
        }

        .profit-pos { color: var(--success-green); font-weight: bold; }
        .profit-neg { color: #f87171; font-weight: bold; }
        
        .btn-primary { background-color: var(--accent-blue); border: none; border-radius: 10px; }
        .btn-primary:hover { background-color: #2563eb; }

        label { color: var(--text-muted); margin-bottom: 5px; }
        /* جعل الرقم القومي باللون الأبيض */
.national-id-text {
    color: #ffffff !important;
    font-weight: 500;
}

/* تحسين مساحة الملاحظات في الجدول */
.notes-cell {
    min-width: 300px;       /* إعطاء مساحة عرضية واسعة (بالعرض) */
    max-width: 400px;       /* حد أقصى للعرض لا يتجاوزه */
    white-space: nowrap;    /* منع النص من النزول لسطر جديد (يبقى في سطر واحد) */
    overflow: hidden;       /* إخفاء النص الزائد عن المساحة */
    text-overflow: ellipsis; /* إظهار نقاط ... عند نهاية النص */
    color: #ffffff !important; /* لون أبيض للنص */
    font-size: 0.95rem;
}
/* هذا الكود يضيف مسافة 8 بكسل بين كل زر والآخر */
.btn-group .btn {
    margin-left: 8px !important; /* مسافة من جهة اليسار */
    border-radius: 6px !important; /* تحسين شكل الزوايا لتبدو منفصلة */
}

/* لإزالة المسافة من آخر زر فقط لضبط المحاذاة */
.btn-group .btn:last-child {
    margin-left: 0 !important;
}


    </style>
</head>
<body>
    
    
    <div class="container-fluid px-4">
        
        <div class="d-flex justify-content-between mb-4 align-items-center">
            <h3 class="fw-bold text-white"><i class="fas fa-users text-primary me-2"></i> إدارة حسابات العملاء</h3>
            <button class="btn btn-primary px-4 fw-bold shadow-lg" onclick="window.resetForm()" data-bs-toggle="modal" data-bs-target="#clientModal">
                <i class="fas fa-plus-circle me-1"></i> إضافة عميل جديد
            </button>
        </div>
        
        <div class="card-table shadow-lg">
            <div class="mb-4">
                <div class="input-group search-box shadow-sm">
                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                    <input type="text" id="searchInput" class="form-control" placeholder="بحث شامل..." onkeyup="filterClients()">
                </div>
            </div>

            <div class="table-container">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>اسم العميل</th>
                            <th>الهاتف</th>
                            <th>الرقم القومي</th>
                            <th>نوع الخدمة</th>
                            <th>التكلفة</th>
                            <th>المطلوب</th>
                            <th>المدفوع</th>
                            <th>المتبقي</th>
                            <th>الربح</th>
                            <th>الحالة</th>
                            <th>الأقساط</th>
                            <th>المسؤول</th>
                            <th>آخر دفع</th>
                            <th>الملاحظات</th>
                            <th class="text-center">إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="clientsTable">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="clientModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content shadow-2xl">
                <form id="clientForm">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold text-white"><i class="fas fa-user-edit me-2 text-primary"></i> تفاصيل الحجز والبيانات المالية</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body row g-3">
                        <input type="hidden" id="editClientId">
                        
                        <div class="col-md-6">
                            <label class="form-label">اسم العميل</label>
                            <input type="text" id="cName" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">رقم الهاتف</label>
                            <input type="text" id="cPhone" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">الرقم القومي</label>
                            <input type="text" id="cNationalId" class="form-control" maxlength="14" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">نوع الخدمة</label>
                            <input type="text" id="cService" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">التكلفة (Actual)</label>
                            <input type="number" id="cCost" class="form-control" value="0" step="0.01">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">المطلوب (Due)</label>
                            <input type="number" id="cTotal" class="form-control" value="0" step="0.01">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">المدفوع</label>
                            <input type="number" id="cPaid" class="form-control" value="0" step="0.01">
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">عدد الأقساط</label>
                            <input type="number" id="cNumInstall" class="form-control" value="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">الأقساط المدفوعة</label>
                            <input type="number" id="cPaidInstall" class="form-control" value="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">حالة الدفع</label>
                            <select id="cStatus" class="form-select">
                                <option value="دفع جزئي">دفع جزئي</option>
                                <option value="مدفوع">مدفوع</option>
                                <option value="غير مدفوع">غير مدفوع</option>
                            </select>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label">ملاحظات</label>
                            <textarea id="cNotes" class="form-control" rows="2" placeholder="أضف ملاحظات إضافية..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary px-5 fw-bold">حفظ البيانات</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="paymentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content" style="background: #1e293b; border: 1px solid var(--accent-blue);">
            <div class="modal-header border-0">
                <h6 class="modal-title text-white">إضافة دفعة مالية جديدة</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="payClientId"> <label class="small mb-2 text-white-50">المبلغ المدفوع الآن:</label>
                <input type="number" id="newPayAmount" class="form-control mb-3" placeholder="0.00"> <button class="btn btn-success w-100 fw-bold" onclick="submitQuickPayment()">تأكيد الدفع ✅</button>
            </div>
        </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../JS/client.js"></script> 
</body>
</html>
