<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | BookSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --dark-sidebar: #1a1d21;
            --dark-bg: #f4f7f6;
            --accent-blue: #007bff;
        }

        body { background: var(--dark-bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            height: 100vh;
            background: var(--dark-sidebar);
            position: fixed;
            right: 0;
            top: 0;
            padding: 20px;
            color: white;
            z-index: 1000;
        }

        .sidebar h2 { color: var(--accent-blue); font-weight: bold; margin-bottom: 30px; text-align: center; }

        .nav-link {
            color: #adb5bd;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
        }

        .nav-link i { margin-left: 10px; width: 20px; }
        .nav-link:hover, .nav-link.active { background: #2c3036; color: white; }
        .nav-link.logout { color: #dc3545; margin-top: 50px; }

        /* Main Content area */
        .main-content { margin-right: 250px; padding: 40px; }

        /* Dashboard Cards */
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid transparent;
        }

        .stat-card.revenue { border-color: #0d6efd; }
        .stat-card.costs { border-color: #198754; }
        .stat-card.expenses { border-color: #dc3545; }

        .stat-icon { font-size: 2rem; opacity: 0.3; }
        .stat-label { color: #6c757d; font-size: 0.9rem; margin-bottom: 5px; }
        .stat-value { font-weight: bold; font-size: 1.8rem; margin: 0; }

        .table-card { background: white; border-radius: 12px; padding: 25px; margin-top: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>BookSystem</h2>
        <nav class="nav flex-column">
            <a href="#" class="nav-link active"><i class="fas fa-chart-line"></i> الإحصائيات</a>
            <a href="/HTML/Clients/clients.html" class="nav-link"><i class="fas fa-user-plus"></i> إضافة عميل</a>
            <a href="/HTML/Expense/expense.html" class="nav-link"><i class="fas fa-wallet"></i> إضافة مصروف</a>
            <a href="#" class="nav-link logout" onclick="logout()"><i class="fas fa-power-off"></i> تسجيل خروج</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold">لوحة التحكم | الإيرادات</h3>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="stat-card revenue">
                    <div>
                        <p class="stat-label">إجمالي المستحق</p>
                        <h3 class="stat-value" id="totalRevenue">0</h3>
                    </div>
                    <i class="fas fa-file-invoice-dollar stat-icon text-primary"></i>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card costs">
                    <div>
                        <p class="stat-label">صافي الإيرادات</p>
                        <h3 class="stat-value" id="netProfit">0</h3>
                    </div>
                    <i class="fas fa-hand-holding-usd stat-icon text-success"></i>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card expenses">
                    <div>
                        <p class="stat-label">المصروفات</p>
                        <h3 class="stat-value" id="totalExpenses">0</h3>
                    </div>
                    <i class="fas fa-receipt stat-icon text-danger"></i>
                </div>
            </div>
        </div>

        <div class="table-card">
            <h5 class="mb-4">قائمة العملاء الحالية</h5>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>العميل</th><th>رقم الهاتف</th><th>الخدمة</th><th>المطلوب</th><th>المدفوع</th><th>المتبقي</th><th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="dashboardTable">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/JS/app.js"></script>
    <script>
        function logout() {
            localStorage.clear();
            window.location.href = "/HTML/Auth/Login.html";
        }
    </script>
</body>
</html>
