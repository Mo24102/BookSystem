<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | الإحصائيات المتقدمة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --dark-sidebar: #1e293b; 
            --dark-bg: #0f172a; 
            --card-bg: #1e293b;
            --accent-blue: #3b82f6; 
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        body { 
            background: var(--dark-bg); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            color: var(--text-main);
        }

        /* السايدبار المطور */
        .sidebar { 
            width: 260px; 
            height: 100vh; 
            background: var(--dark-sidebar); 
            position: fixed; 
            right: 0; 
            top: 0; 
            padding: 20px; 
            z-index: 1000; 
            display: flex; 
            flex-direction: column;
            border-left: 1px solid var(--border-color);
        }

        .sidebar h2 { 
            color: #fff; 
            font-weight: 800; 
            margin-bottom: 30px; 
            text-align: center; 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 15px; 
        }

        .nav-link { 
            color: var(--text-muted); 
            padding: 12px 15px; 
            border-radius: 12px; 
            margin-bottom: 8px; 
            transition: 0.3s all ease; 
            display: flex; 
            align-items: center; 
            text-decoration: none; 
        }

        .nav-link i { margin-left: 12px; font-size: 1.1rem; }
        
        .nav-link:hover, .nav-link.active { 
            background: rgba(59, 130, 246, 0.1); 
            color: var(--accent-blue); 
        }

        .nav-link.active {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .logout { 
            color: #fb7185 !important; 
            border: 1px solid rgba(251, 113, 133, 0.3) !important; 
            margin-top: auto; 
            border-radius: 12px;
        }
        .logout:hover {
            background: #fb7185 !important;
            color: white !important;
        }

        /* المحتوى الأساسي */
        .main-content { margin-right: 260px; padding: 40px; }

        header {
            background: var(--card-bg) !important;
            border: 1px solid var(--border-color);
        }

        h2.text-dark { color: var(--text-main) !important; }

        /* الكروت الداكنة */
        .stat-card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 24px; 
            border: 1px solid var(--border-color);
            transition: 0.3s; 
        }
        .stat-card:hover { 
            transform: translateY(-5px); 
            border-color: var(--accent-blue);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .stat-label { color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }
        .stat-value { font-size: 1.75rem; font-weight: 800; color: #fff; margin-top: 5px; }
        
        .stat-icon { 
            width: 50px; 
            height: 50px; 
            border-radius: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.3rem;
        }

        /* ألوان الأيقونات في الوضع الداكن */
        .bg-light-blue { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .bg-light-green { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
        .bg-light-red { background: rgba(239, 68, 68, 0.15); color: #f87171; }
        .bg-light-orange { background: rgba(249, 115, 22, 0.15); color: #fb923c; }

        .form-select {
            background-color: var(--dark-bg);
            border-color: var(--border-color);
            color: white;
        }
        .form-select:focus {
            background-color: var(--dark-bg);
            color: white;
            border-color: var(--accent-blue);
            box-shadow: none;
        }

        /* الحاويات الرسومية */
        .chart-container { 
            background: var(--card-bg); 
            border-radius: 24px; 
            padding: 30px; 
            border: 1px solid var(--border-color);
        }

        canvas { filter: drop-shadow(0 0 5px rgba(0,0,0,0.1)); }

    </style>
</head>
<body>

    <div class="sidebar">
        <h2>BookSystem</h2>
        <nav class="nav flex-column h-100">
            <a href="#" class="nav-link active"><i class="fas fa-chart-pie"></i> الإحصائيات</a>
            <a href="/HTML/Clients/clients.html" class="nav-link"><i class="fas fa-users"></i> إدارة العملاء</a>
            <a href="/HTML/Expense/expense.html" class="nav-link"><i class="fas fa-wallet"></i> المصروفات</a>
            <button class="nav-link logout w-100 bg-transparent text-start" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </nav>
    </div>

    <div class="main-content">
        <header class="mb-5 d-flex justify-content-between align-items-center p-4 rounded-4 shadow-lg">
            <div>
                <h2 class="fw-bold text-white m-0">نظرة عامة على الأداء</h2>
                <p class="text-white-50 m-0" id="currentDate">جاري تحديث البيانات...</p>
            </div>
            
            <div class="d-flex gap-2">
                <select id="selectMonth" class="form-select shadow-sm" style="width: 130px;" onchange="updateDashboard()">
                    <option value="1">يناير</option>
                    <option value="2" selected>فبراير</option>
                    <option value="3">مارس</option>
                    <option value="4">أبريل</option>
                    <option value="5">مايو</option>
                    <option value="6">يونيو</option>
                    <option value="7">يوليو</option>
                    <option value="8">أغسطس</option>
                    <option value="9">سبتمبر</option>
                    <option value="10">أكتوبر</option>
                    <option value="11">نوفمبر</option>
                    <option value="12">ديسمبر</option>
                </select>
                <select id="selectYear" class="form-select shadow-sm" style="width: 110px;" onchange="updateDashboard()">
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                    <option value="2028">2028</option>
                    <option value="2029">2029</option>
                    <option value="2030">2030</option>
                </select>
            </div>
        </header>

        <div class="row g-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex justify-content-between align-items-center">
                        <div><p class="stat-label">الإيرادات</p><h3 class="stat-value" id="totalRevenue">0</h3></div>
                        <div class="stat-icon bg-light-blue"><i class="fas fa-dollar-sign"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex justify-content-between align-items-center">
                        <div><p class="stat-label">التكاليف</p><h3 class="stat-value" id="totalDirectCosts">0</h3></div>
                        <div class="stat-icon bg-light-orange"><i class="fas fa-tools"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex justify-content-between align-items-center">
                        <div><p class="stat-label">المصروفات</p><h3 class="stat-value" id="totalExpenses">0</h3></div>
                        <div class="stat-icon bg-light-red"><i class="fas fa-receipt"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card border-success border-opacity-25">
                    <div class="d-flex justify-content-between align-items-center">
                        <div><p class="stat-label">صافي الربح</p><h3 class="stat-value text-success" id="netProfit">0</h3></div>
                        <div class="stat-icon bg-light-green"><i class="fas fa-chart-line"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-lg-8">
                <div class="chart-container shadow-lg">
                    <h5 class="fw-bold mb-4 text-white">تحليل الأداء السنوي</h5>
                    <canvas id="profitChart" height="300"></canvas>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="chart-container shadow-lg h-100">
                    <h5 class="fw-bold mb-4 text-white">توزيع التكاليف</h5>
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/JS/app.js"></script>
</body>
</html>
