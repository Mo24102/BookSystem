<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الإدارة | BookSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .sidebar { min-height: 100vh; background: #1a1d20; color: white; position: sticky; top: 0; }
        .nav-link { color: #adb5bd; transition: 0.3s; margin-bottom: 5px; }
        .nav-link:hover, .nav-link.active { color: white; background: #323539; border-radius: 8px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-icon { font-size: 2rem; opacity: 0.3; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block sidebar p-3 text-center">
            <h3 class="my-4 text-primary fw-bold">BookSystem</h3>
            <ul class="nav flex-column text-end">
                <li class="nav-item"><a class="nav-link active" href="#"><i class="fas fa-chart-line ms-2"></i> الإحصائيات</a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#clientModal"><i class="fas fa-user-plus ms-2"></i> إضافة عميل</a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#expenseModal"><i class="fas fa-wallet ms-2"></i> إضافة مصروف</a></li>
                <hr class="text-secondary">
                <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="logout()"><i class="fas fa-power-off ms-2"></i> تسجيل خروج</a></li>
            </ul>
        </nav>

        <main class="col-md-10 px-md-4 py-4">
            <h2 class="mb-4 fw-bold">لوحة التحكم الإيرادات</h2>
            
            <div class="row mb-4 g-3">
                <div class="col-md-4">
                    <div class="card bg-white p-3 border-start border-primary border-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div><h6 class="text-muted">إجمالي المستحق</h6><h3 id="statTotalDue">0</h3></div>
                            <i class="fas fa-file-invoice-dollar stat-icon text-primary"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-white p-3 border-start border-success border-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div><h6 class="text-muted">صافي الإيرادات</h6><h3 id="statRevenue">0</h3></div>
                            <i class="fas fa-hand-holding-dollar stat-icon text-success"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-white p-3 border-start border-danger border-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div><h6 class="text-muted">المصروفات</h6><h3 id="statExpenses">0</h3></div>
                            <i class="fas fa-receipt stat-icon text-danger"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card p-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold">قائمة العملاء الحالية</h5>
                    <input type="text" id="searchInput" class="form-control w-25" placeholder="بحث باسم العميل...">
                </div>
                <div class="table-responsive">
                    <table class="table table-hover border-top">
                        <thead class="table-light">
                            <tr>
                                <th>العميل</th>
                                <th>رقم الهاتف</th>
                                <th>الخدمة</th>
                                <th>المطلوب</th>
                                <th>المدفوع</th>
                                <th>المتبقي</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="clientsTable">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<div class="modal fade" id="clientModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header"><h5>بيانات العميل</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="clientForm" class="row g-3">
                    <input type="hidden" id="editClientId">
                    <div class="col-md-6"><label>اسم العميل</label><input type="text" id="cName" class="form-control" required></div>
                    <div class="col-md-6"><label>رقم الهاتف</label><input type="text" id="cPhone" class="form-control"></div>
                    <div class="col-md-6"><label>الرقم القومي</label><input type="text" id="cNationalId" class="form-control"></div>
                    <div class="col-md-6"><label>نوع الخدمة</label><input type="text" id="cService" class="form-control"></div>
                    <div class="col-md-4"><label>إجمالي المبلغ</label><input type="number" id="cTotal" class="form-control" step="0.01"></div>
                    <div class="col-md-4"><label>المبلغ المدفوع</label><input type="number" id="cPaid" class="form-control" step="0.01"></div>
                    <div class="col-md-4"><label>التكلفة الفعلية</label><input type="number" id="cCost" class="form-control" step="0.01"></div>
                    <div class="col-md-12"><label>ملاحظات</label><textarea id="cNotes" class="form-control"></textarea></div>
                    <div class="col-12"><button type="submit" class="btn btn-primary w-100">حفظ العميل</button></div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="expenseModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5>إضافة مصروف</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            <div class="modal-body">
                <form id="expenseForm">
                    <div class="mb-3"><label>الفئة</label><input type="text" id="eCat" class="form-control" placeholder="مثال: غاز، كهرباء"></div>
                    <div class="mb-3"><label>المبلغ</label><input type="number" id="eAmount" class="form-control" step="0.01"></div>
                    <div class="mb-3"><label>التاريخ</label><input type="datetime-local" id="eDate" class="form-control"></div>
                    <div class="mb-3"><label>ملاحظات</label><input type="text" id="eNotes" class="form-control"></div>
                    <button type="submit" class="btn btn-danger w-100">تسجيل المصروف</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
